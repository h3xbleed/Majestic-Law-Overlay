<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Пин — Majestic Law</title>
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="main.css">
<style>
  body { background: transparent; }
  .pin {
    display: flex; flex-direction: column;
    height: 100vh;
    background: var(--bg-panel);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .pin-head {
    display: flex; align-items: center; gap: 9px;
    height: 38px; padding: 0 8px 0 12px;
    border-bottom: 1px solid var(--line);
    flex: none; cursor: default;
  }
  .pin-num {
    font: 600 11.5px var(--mono);
    background: var(--accent); color: #fff;
    border-radius: 5px; padding: 2px 7px;
  }
  .pin-title {
    flex: 1; min-width: 0;
    font-size: 12px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pin-op {
    -webkit-appearance: none; appearance: none;
    width: 52px; height: 3px; border-radius: 2px;
    background: var(--bg-active); outline: none; cursor: pointer;
  }
  .pin-op::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%;
    background: var(--text-muted); cursor: pointer; transition: background var(--t);
  }
  .pin-op:hover::-webkit-slider-thumb { background: var(--accent); }
  .pin-body { flex: 1; overflow-y: auto; padding: 10px 14px 12px; }
  .pin-san { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-bottom: 8px; font: 500 11px var(--mono); }
  .pin-text { font-size: 12.5px; line-height: 1.55; color: var(--text-soft); white-space: pre-wrap; max-width: none; }
  .pin-body::-webkit-scrollbar { width: 6px; }
  .pin-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
</style>
</head>
<body>
  <div class="pin">
    <header class="pin-head" data-tauri-drag-region>
      <span class="pin-num" id="num"></span>
      <span class="pin-title" id="title"></span>
      <input class="pin-op" id="opacity" type="range" min="45" max="100" value="100" title="Прозрачность">
      <button class="win-btn win-close" id="close" title="Закрыть пин">
        <svg width="11" height="11" viewBox="0 0 11 11"><path d="m2.5 2.5 6 6m0-6-6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </header>
    <div class="pin-body">
      <div class="pin-san" id="san"></div>
      <div class="pin-text" id="text"></div>
    </div>
  </div>
<script>
'use strict';
const key = new URLSearchParams(location.search).get('k');
const a = JSON.parse(localStorage.getItem(key) || 'null');
if (a) {
  document.getElementById('num').textContent = a.num;
  document.getElementById('title').textContent = a.title || 'Статья ' + a.num;
  document.title = 'Пин: ' + a.num + ' — ' + (a.title || '');
  const san = document.getElementById('san');
  for (const [cls, txt] of a.chips || []) {
    const s = document.createElement('span');
    s.className = cls; s.textContent = txt;
    san.append(s);
  }
  const t = document.getElementById('text');
  const safe = a.text.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  t.innerHTML = safe.replace(/(Наказание:[^\n]*)/g, '<span class="hl-pen">$1</span>');
}
document.getElementById('close').addEventListener('click', () => {
  if (window.__TAURI__) window.__TAURI__.window.getCurrentWindow().close();
});
document.getElementById('opacity').addEventListener('input', (e) => {
  document.querySelector('.pin').style.opacity = e.target.value / 100;
});
</script>
</body>
</html>
